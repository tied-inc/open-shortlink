name: Create GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to create (e.g. v0.1.0). Created from the workflow ref if it does not exist yet."
        required: true
        type: string
      name:
        description: "Release title (defaults to the tag name)."
        required: false
        type: string
      prerelease:
        description: "Mark this release as a pre-release."
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: create-release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_NAME: ${{ github.event.inputs.name }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi
          if [ -z "$tag" ]; then
            echo "Tag name could not be resolved" >&2
            exit 1
          fi
          name="$INPUT_NAME"
          if [ -z "$name" ]; then
            name="$tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Create tag if missing (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists locally"
            exit 0
          fi
          if gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on remote"
            git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          NAME: ${{ steps.tag.outputs.name }}
          PRERELEASE: ${{ github.event.inputs.prerelease }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; skipping"
            exit 0
          fi
          args=(release create "${TAG}" --title "${NAME}" --generate-notes --verify-tag)
          if [ "${PRERELEASE}" = "true" ]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"

  sync-release-docs:
    needs: release
    uses: ./.github/workflows/update-release-docs.yml
    permissions:
      contents: write
      actions: write
