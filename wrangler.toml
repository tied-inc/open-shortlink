name = "open-shortlink"
main = "src/index.ts"
compatibility_date = "2026-04-01"
workers_dev = false

[observability]
enabled = true

# KV namespace is auto-provisioned by Wrangler on first `wrangler deploy`
# when `id` is omitted (Wrangler 4.45+). The Deploy to Cloudflare button
# uses this same mechanism — no manual `wrangler kv namespace create` step
# is required.
[[kv_namespaces]]
binding = "SHORTLINKS"

# OAuth token storage for Claude Desktop and other OAuth MCP clients.
# Auto-provisioned on first deploy (same as SHORTLINKS above).
[[kv_namespaces]]
binding = "OAUTH_KV"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "open_shortlink_clicks"

# Custom-domain deployment. Uncomment and set `routes` plus `vars` to split
# the redirect host from the API/MCP host on a single worker. See
# .dev.vars.example for the matching local values.
#
# routes = [
#   { pattern = "go.example.com/*",  zone_name = "example.com" },
#   { pattern = "api.example.com/*", zone_name = "example.com" },
# ]
#
# [vars]
# PUBLIC_BASE_URL = "https://go.example.com"
# REDIRECT_HOST   = "go.example.com"
# API_HOST        = "api.example.com"
